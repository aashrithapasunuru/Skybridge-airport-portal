<!DOCTYPE html>
<html>

<head>

<title>Employee Inbox</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
    margin:0;
}

.header{
    background:#1e293b;
    padding:20px;
    border-bottom:1px solid #334155;
}

.container{
    padding:25px;
}

table{
    width:100%;
    border-collapse:collapse;
    background:#1e293b;
}

th{
    background:#111827;
    color:#38bdf8;
}

th,td{
    padding:14px;
    border-bottom:1px solid #334155;
    text-align:left;
}

tr:hover{
    background:#273549;
}

a{
    color:white;
    text-decoration:none;
}

.unread{
    font-weight:bold;
}

.back-btn{
    display:inline-block;
    margin-bottom:20px;
    background:#0ea5e9;
    color:white;
    padding:10px 18px;
    text-decoration:none;
    border-radius:8px;
}

.back-btn:hover{
    background:#0284c7;
}

.badge{
    background:#ef4444;
    color:white;
    padding:3px 8px;
    border-radius:10px;
    font-size:12px;
}

</style>

</head>

<body>

<div class="header">

<h2>📧 Employee Inbox</h2>

</div>

<div class="container">

<a href="/employee/dashboard" class="back-btn">
⬅ Back to Dashboard
</a>

<table>

<tr>

<th>Status</th>
<th>Sender</th>
<th>Subject</th>
<th>Received</th>

</tr>

{% for email in emails %}

<tr>

<td>

{% if email["is_read"] == 0 %}
<span class="badge">NEW</span>
{% else %}
Read
{% endif %}

</td>

<td>{{ email["sender"] }}</td>

<td>
    <a href="{{ url_for('view_email', email_id=email['id']) }}" style="color:yellow;">
        {{ email["subject"] }}
    </a>
</td>

<td>{{ email["received_at"] }}</td>

</tr>

{% endfor %}

</table>

</div>

</body>

</html>
