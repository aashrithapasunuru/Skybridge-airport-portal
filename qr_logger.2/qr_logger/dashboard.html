<!DOCTYPE html>
<html>
<head>
<title>SOC WiFi Logs Dashboard</title>

<style>
body {
    font-family: Arial;
    background: #0f172a;
    color: white;
    padding: 20px;
}

table {
    width: 100%;
    border-collapse: collapse;
    background: #1e293b;
}

th, td {
    padding: 10px;
    border: 1px solid #334155;
    text-align: left;
    font-size: 13px;
}

th {
    background: #334155;
}

.high {
    color: red;
    font-weight: bold;
}
</style>
</head>

<body>

<h2>🚨 SOC WiFi Access Logs</h2>

<table>
<tr>
    <th>ID</th>
    <th>Timestamp</th>
    <th>IP</th>
    <th>Browser</th>
    <th>OS<th>
    <th>Device</th>
    <th>Username</th>
    <th>WiFi ID</th>
    <th>Lat</th>
    <th>Lon</th>
</tr>

{% for log in logs %}
<tr>
    <td>{{ log[0] }}</td>
    <td>{{ log[1] }}</td>
    <td>{{ log[2] }}</td>
    <td>{{ log[3] }}</td>
    <td>{{ log[4] }}</td>
    <td>{{ log[5] }}</td>
    <td>{{ log[6] }}</td>
    <td>{{ log[7] }}</td>
    <td>{{ log[8] }}</td>
    <td>{{ log[9] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
